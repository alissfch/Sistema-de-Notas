<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - José Carlos Mariátegui</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f4f9f4;
            font-family: 'Jost', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h2, h3 { 
            font-family: 'Playfair Display', serif; 
            color: #1b4332; 
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(45, 106, 79, 0.1);
            overflow: hidden;
            border: none;
            max-width: 900px;
        }
        .bg-green { 
            background-color: #2d6a4f; 
            color: white; 
        }
        .btn-green { 
            background-color: #40916c; 
            color: white; 
            border-radius: 8px; 
            font-weight: 500; 
            padding: 10px;
        }
        .btn-green:hover { 
            background-color: #1b4332; 
            color: white; 
        }
        .form-control { 
            border-radius: 8px; 
            border: 1px solid #d8e2dc; 
            padding: 12px; 
        }
        .form-control:focus { 
            border-color: #40916c; 
            box-shadow: 0 0 0 0.2rem rgba(64, 145, 108, 0.25); 
        }
        .vector-panel { 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="card login-card flex-row p-0">
                
                <div class="col-md-5 bg-green vector-panel d-none d-md-flex">
                    <i class="fas fa-graduation-cap fa-5x mb-4"></i>
                    <h3>Sistema Académico JCM</h3>
                    <p class="mt-3 font-weight-light">Gestión eficiente para docentes, alumnos y administrativos.</p>
                </div>

                <div class="col-md-7 p-5">
                    <h2 class="mb-4 text-center">Bienvenido de nuevo</h2>
                    
                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Correo o contraseña incorrectos.
                    </div>

                    <form th:action="@{/login}" method="POST">
                        <div class="mb-4">
                            <label for="correo" class="form-label text-muted">Correo Institucional</label>
                            <input type="email" class="form-control" id="correo" name="username" placeholder="usuario@jcm.edu.pe" required>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label text-muted">Contraseña</label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="••••••••" 
                                   required 
                                   pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}"
                                   title="Debe contener al menos 8 caracteres, una mayúscula, una minúscula, un número y un carácter especial.">
                        </div>

                        <button type="submit" class="btn btn-green w-100">Ingresar al Sistema</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
