<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Usuario | I.E. José Carlos Mariátegui</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />

    <style>
        body {
            font-family: "Jost", sans-serif;
            background-color: #f4f9f4;
        }

        h2 {
            font-family: "Playfair Display", serif;
            color: #1c4b27;
        }

        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(28, 75, 39, 0.08);
        }

        .btn-green {
            background-color: #2b7a3e;
            color: white;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-green:hover {
            background-color: #1c4b27;
            color: white;
            transform: translateY(-2px);
        }

        .form-label {
            color: #2b7a3e;
            font-weight: 500;
        }

        .input-group-text {
            background-color: #e9f2eb;
            border-color: #ced4da;
            color: #1c4b27;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #2b7a3e;
            box-shadow: 0 0 0 0.25rem rgba(43, 122, 62, 0.25);
        }
    </style>
</head>

<body>
    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="card card-custom p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h2>Registrar Nuevo Usuario</h2>
                        <p class="text-muted">
                            Complete los datos para dar acceso al sistema académico.
                        </p>
                    </div>

                    <div th:if="${errorClave}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${errorClave}">Error en la validación.</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>

                    <form th:action="@{/admin/crear-usuario}" method="POST" id="formUsuario">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="nombre" class="form-label">Nombres</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" required placeholder="Ej. Juan Carlos" />
                            </div>
                            <div class="col-md-6 mt-3 mt-md-0">
                                <label for="apellido" class="form-label">Apellidos</label>
                                <input type="text" class="form-control" id="apellido" name="apellido" required placeholder="Ej. Pérez Silva" />
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="correo" class="form-label">Correo Institucional</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" class="form-control" id="correo" name="correo" required placeholder="usuario@jcm.edu.pe" />
                            </div>
                            <div class="form-text">
                                Obligatorio el uso del dominio @jcm.edu.pe
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="contrasenaSinEncriptar" class="form-label">Contraseña de Acceso</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="contrasenaSinEncriptar" name="contrasenaSinEncriptar" required placeholder="Cree una contraseña segura" />
                            </div>
                            <div class="form-text text-muted" style="font-size: 0.85rem">
                                <i class="bi bi-shield-check text-success"></i> Requiere: Mín. 8 caracteres, mayúscula, minúscula, número y símbolo.
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="rol" class="form-label">Rol del Usuario</label>
                            <select class="form-select" id="rol" name="rol" onchange="adaptarFormulario()" required>
                                <option value="" selected disabled>Seleccione el rol correspondiente...</option>
                                <option value="ALUMNO">Alumno</option>
                                <option value="DOCENTE">Docente</option>
                            </select>
                        </div>

                        <div class="row mb-4 align-items-start" id="seccionAdicional" style="display: none; background-color: #f8fbf8; padding: 15px; border-radius: 8px; border: 1px solid #e9f2eb;">
                            
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="codigo" class="form-label" id="labelCodigo">Código Institucional / DNI</label>
                                <input type="text" class="form-control" id="codigo" name="codigo" placeholder="Ingrese el identificador" />
                            </div>

                            <div class="col-md-6" id="contenedorGradoSeccion" style="display: none;">
                                <div class="row">
                                    <div class="col-6">
                                        <label for="grado" class="form-label"><i class="bi bi-mortarboard me-1"></i>Grado</label>
                                        <select class="form-select" id="grado" name="grado">
                                            <option value="" selected disabled>Elegir...</option>
                                            <option value="1ro Secundaria">1ro</option>
                                            <option value="2do Secundaria">2do</option>
                                            <option value="3ro Secundaria">3ro</option>
                                            <option value="4to Secundaria">4to</option>
                                            <option value="5to Secundaria">5to</option>
                                        </select>
                                    </div>
                                    <div class="col-6">
                                        <label for="seccion" class="form-label"><i class="bi bi-diagram-3 me-1"></i>Sección</label>
                                        <select class="form-select" id="seccion" name="seccion">
                                            <option value="" selected disabled>Elegir...</option>
                                            <option value="A">A</option>
                                            <option value="B">B</option>
                                            <option value="C">C</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12 mt-4" id="contenedorCursosDocente" style="display: none;">
                                <hr style="border-color: #c9e0d0;">
                                <h6 class="text-success mb-3 fw-bold"><i class="bi bi-book me-2"></i>Asignación de Cursos a Cargo</h6>
                                <div class="row">
                                    <div class="col-md-6 mb-2">
                                        <label for="curso1" class="form-label text-muted small">Primer Curso</label>
                                        <select class="form-select" id="curso1" name="cursoIds">
                                            <option value="" selected disabled>-- Seleccione 1er curso --</option>
                                            <option th:each="curso : ${todosLosCursos}" 
                                                    th:value="${curso.idCurso}" 
                                                    th:text="${curso.nombre} + ' - ' + ${curso.grado} + ' ' + ${curso.seccion}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 mb-2">
                                        <label for="curso2" class="form-label text-muted small">Segundo Curso</label>
                                        <select class="form-select" id="curso2" name="cursoIds">
                                            <option value="" selected disabled>-- Seleccione 2do curso --</option>
                                            <option th:each="curso : ${todosLosCursos}" 
                                                    th:value="${curso.idCurso}" 
                                                    th:text="${curso.nombre} + ' - ' + ${curso.grado} + ' ' + ${curso.seccion}">
                                            </option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a th:href="@{/admin/panel}" class="btn btn-light px-4 me-md-2 border">Cancelar</a>
                            <button type="submit" class="btn btn-green px-5" style="background-color: #2b7a3e; color: white;">
                                Crear Usuario
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function adaptarFormulario() {
            const rol = document.getElementById("rol").value;
            const seccionAdicional = document.getElementById("seccionAdicional");
            const labelCodigo = document.getElementById("labelCodigo");
            const inputCodigo = document.getElementById("codigo");

            const contenedorGradoSeccion = document.getElementById("contenedorGradoSeccion");
            const selectGrado = document.getElementById("grado");
            const selectSeccion = document.getElementById("seccion");

            const contenedorCursosDocente = document.getElementById("contenedorCursosDocente");
            const selectCurso1 = document.getElementById("curso1");
            const selectCurso2 = document.getElementById("curso2");

            if (rol === "ALUMNO") {
                seccionAdicional.style.display = "flex";
                labelCodigo.innerHTML = '<i class="bi bi-person-badge me-1"></i> Código de Alumno';
                inputCodigo.placeholder = "Ej. AL2026001";
                inputCodigo.required = true;

                contenedorGradoSeccion.style.display = "block";
                selectGrado.required = true;
                selectSeccion.required = true;

                contenedorCursosDocente.style.display = "none";
                selectCurso1.required = false;
                selectCurso1.value = "";
                selectCurso2.required = false;
                selectCurso2.value = "";

            } else if (rol === "DOCENTE") {
                seccionAdicional.style.display = "flex";
                labelCodigo.innerHTML = '<i class="bi bi-briefcase me-1"></i> Código de Docente / DNI';
                inputCodigo.placeholder = "Ej. DOC-76543210";
                inputCodigo.required = true;

                contenedorGradoSeccion.style.display = "none";
                selectGrado.required = false;
                selectGrado.value = "";
                selectSeccion.required = false;
                selectSeccion.value = "";

                contenedorCursosDocente.style.display = "block";
                selectCurso1.required = true;
                selectCurso2.required = true;
            } else {
                seccionAdicional.style.display = "none";
            }
        }
    </script>
</body>
</html>
