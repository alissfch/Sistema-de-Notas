<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Estadísticas Académicas | JCM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    </head>
<body class="bg-light p-5">
<div class="container bg-white p-4 rounded shadow-sm">
    <h2 class="mb-4 text-success"><i class="bi bi-graph-up-arrow me-2"></i>Estadísticas Académicas Generales</h2>

    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card p-3 border-primary">
                <h5>Rendimiento General</h5>
                <p>Promedio: <span th:text="${promedioGeneral}">0</span></p>
                <p>Total Notas: <span th:text="${totalNotas}">0</span></p>
            </div>
        </div>
        </div>

    <table class="table table-striped">
        <thead>
            <tr><th>Curso</th><th>Total Alumnos</th><th>Aprobados</th><th>Desaprobados</th><th>% Aprobación</th></tr>
        </thead>
        <tbody>
            </tbody>
    </table>
    
    <a th:href="@{/admin/panel}" class="btn btn-outline-secondary mt-3">Volver al Inicio</a>
</div>
</body>
</html>
