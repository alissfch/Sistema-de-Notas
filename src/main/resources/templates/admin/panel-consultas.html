<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Consultas del Sistema | JCM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light p-5">

<div class="container bg-white p-4 rounded shadow-sm">
    <h2 class="mb-4 text-success">Módulo de Consultas Avanzadas</h2>

    <div class="row">
        <div class="col-md-6 border-end">
            <h5>Buscar Alumno</h5>
            <form th:action="@{/admin/consultas}" method="GET" class="d-flex mb-3">
                <input type="text" name="buscarNombre" class="form-control me-2" placeholder="Ej. Juan">
                <button type="submit" class="btn btn-primary">Buscar</button>
            </form>
            
            <ul class="list-group" th:if="${alumnos != null}">
                <li class="list-group-item d-flex justify-content-between align-items-center" th:each="alumno : ${alumnos}">
                    <span th:text="${alumno.nombres} + ' ' + ${alumno.apellidos}">Nombre Completo</span>
                    <span class="badge bg-secondary rounded-pill" th:text="${alumno.seccion}">Sección</span>
                </li>
                <li class="list-group-item text-muted" th:if="${#lists.isEmpty(alumnos)}">No se encontraron alumnos.</li>
            </ul>
        </div>

        <div class="col-md-6">
            <h5>Notas por Código</h5>
            <form th:action="@{/admin/consultas}" method="GET" class="d-flex mb-3">
                <input type="text" name="buscarCodigo" class="form-control me-2" placeholder="Ej. AL2026001">
                <button type="submit" class="btn btn-success">Buscar</button>
            </form>

            <table class="table table-bordered table-striped" th:if="${notas != null}">
                <thead class="table-dark">
                    <tr>
                        <th>Alumno (De Tabla 1)</th>
                        <th>Evaluación (De Tabla 2)</th>
                        <th>Nota</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="nota : ${notas}">
                        <td th:text="${nota.alumno.nombres}">Nombre</td>
                        <td th:text="${nota.evaluacion.nombre}">Examen</td>
                        <td class="fw-bold text-primary" th:text="${nota.valor}">15.00</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(notas)}">
                        <td colspan="3" class="text-center text-muted">Sin notas registradas para este código.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div class="mt-4">
        <a th:href="@{/admin/panel}" class="btn btn-outline-secondary">Volver al Inicio</a>
    </div>
</div>

</body>
</html>
