<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(titulo)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${titulo} + ' | I.E. José Carlos Mariátegui'">Portal Docente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />

    <style>
        :root {
            --primary-color: #1c4b27;
            --secondary-color: #2b7a3e;
            --bg-color: #f3f4f6;
            --sidebar-bg: #111827;
            --sidebar-text: #9ca3af;
            --sidebar-hover: #1f2937;
            --sidebar-active: #2b7a3e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            overflow-x: hidden;
        }

        #sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            z-index: 1000;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
        }

        .sidebar-header {
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.2);
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-header h4 {
            color: white;
            font-weight: 700;
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .sidebar-menu {
            padding: 20px 0;
            flex-grow: 1;
            overflow-y: auto;
        }

        .menu-section {
            padding: 10px 25px 5px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #6b7280;
            font-weight: 700;
            margin-top: 10px;
        }

        .sidebar-menu a {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            color: var(--sidebar-text);
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .sidebar-menu a:hover {
            background-color: var(--sidebar-hover);
            color: white;
        }

        .sidebar-menu a.active {
            background-color: rgba(43, 122, 62, 0.2);
            color: #4ade80;
            border-left: 4px solid #4ade80;
        }

        .sidebar-menu a i {
            margin-right: 15px;
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-logout {
            width: 100%;
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-logout:hover {
            background-color: #ef4444;
            color: white;
        }

        #content {
            margin-left: 280px; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.3s;
        }

        .top-navbar {
            background-color: white;
            height: 70px;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 10px rgba(0, 0, 0, 0.03);
            z-index: 999;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background-color: var(--secondary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(43, 122, 62, 0.3);
        }

        .dashboard-content {
            padding: 40px;
            flex-grow: 1;
        }

        .btn-green {
            background-color: var(--secondary-color);
            color: white;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-green:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-2px);
        }

        .card-custom {
            background: white;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 25px;
            margin-bottom: 25px;
        }

        .page-title {
            font-weight: 700;
            color: #111827;
            margin-bottom: 5px;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .card-curso {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease-in-out;
            height: 100%;
            background: white;
            overflow: hidden;
        }

        .card-curso:hover {
            transform: translateY(-7px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .curso-img-top {
            height: 110px;
            background: linear-gradient(135deg, var(--secondary-color) 0%, #4ade80 100%);
            position: relative;
        }

        .curso-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: white;
            color: var(--primary-color);
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-ingresar {
            background-color: white;
            color: var(--secondary-color);
            border: 1px solid #e5e7eb;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .btn-ingresar:hover {
            background-color: var(--secondary-color);
            color: white;
            border-color: var(--secondary-color);
        }

        .table-custom th {
            background-color: #f9fafb;
            color: #374151;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e5e7eb;
            padding: 15px;
        }

        .table-custom td {
            padding: 15px;
            vertical-align: middle;
            border-bottom: 1px solid #f3f4f6;
        }

        .table-custom tbody tr:hover {
            background-color: #f9fafb;
        }

        .vista-seccion {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .vista-seccion.activa {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            #sidebar {
                transform: translateX(-260px);
            }

            #sidebar.active {
                transform: translateX(0);
            }

            #content {
                margin-left: 0;
            }

            .toggler-btn {
                display: block !important;
            }

            .dashboard-content {
                padding: 20px;
            }
        }
    </style>
</head>

<body>

   <div th:fragment="sidebar(menuActivo, enDetalleCurso)" th:replace="~{componentes/sidebar :: menuLateral(${menuActivo}, ${enDetalleCurso})}"></div>

    <nav class="top-navbar" th:fragment="navbar(nombreDocente, mostrarVolver)">
        <div class="d-flex align-items-center">
            <button class="btn btn-light d-none toggler-btn me-3" id="sidebarToggle">
                <i class="bi bi-list fs-4"></i>
            </button>
            <a th:if="${mostrarVolver}" th:href="@{/docente/panel}" class="btn btn-light me-3">
                <i class="bi bi-arrow-left"></i> Volver
            </a>
            <h5 class="m-0 fw-bold" style="color: #374151">Portal Docente</h5>
        </div>

        <div class="user-profile">
            <div class="text-end d-none d-md-block">
                <div class="fw-bold text-dark fs-6" th:text="${nombreDocente}">Profesor(a)</div>
                <div class="text-muted" style="font-size: 0.8rem">Educación Secundaria</div>
            </div>
            <div class="avatar" th:text="${#strings.substring(nombreDocente,0,1)}">D</div>
        </div>
    </nav>

</body>

</html>
