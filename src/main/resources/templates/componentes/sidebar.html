<div th:fragment="menuLateral">
    <style>
        .admin-sidebar {
            width: 280px;
            background-color: #111827; 
            color: #9ca3af;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        
        .admin-sidebar-header {
            padding: 30px 20px;
            background-color: rgba(0, 0, 0, 0.2);
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .admin-sidebar-header h3 {
            color: white;
            font-family: 'Playfair Display', serif;
            margin-top: 15px;
            margin-bottom: 0;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
        }

        .admin-sidebar-menu {
            padding: 20px 0;
            flex-grow: 1;
            overflow-y: auto;
        }

        .admin-menu-section {
            padding: 15px 25px 5px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: #6b7280;
            font-weight: 700;
            font-family: 'Jost', sans-serif;
        }

        .admin-sidebar-menu a {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            color: #9ca3af;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 0.95rem;
            font-family: 'Jost', sans-serif;
            border-left: 4px solid transparent;
        }

        .admin-sidebar-menu a:hover, .admin-sidebar-menu a:focus {
            background-color: #1f2937;
            color: white;
            border-left: 4px solid #4ade80;
        }

        .admin-sidebar-menu a i {
            margin-right: 15px;
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }

        .main-content {
            margin-left: 280px;
        }
    </style>

    <nav class="admin-sidebar">
        <div class="admin-sidebar-header">
            <i class="fas fa-graduation-cap fa-2x" style="color: #4ade80;"></i>
            <h3>I.E. J.C.M.</h3>
            <span style="font-size: 0.85rem; color: #4ade80; font-family: 'Jost', sans-serif; font-weight: 500;">Panel Administrativo</span>
        </div>

        <div class="admin-sidebar-menu">
            
            <div class="admin-menu-section">Principal</div>
            <a th:href="@{/admin/panel}">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Inicio</span>
            </a>

            <div class="admin-menu-section">Gestión Académica</div>
            <a th:href="@{/admin/crear-usuario}">
                <i class="bi bi-person-plus-fill"></i>
                <span>Crear Usuario</span>
            </a>
            <a th:href="@{/admin/consultas}">
                <i class="bi bi-search"></i>
                <span>Consultas Rápidas</span>
            </a>

            <div class="admin-menu-section">Reportes y Auditoría</div>
            <a th:href="@{/admin/reportes/accesos}">
                <i class="bi bi-shield-lock-fill"></i>
                <span>Log de Accesos</span>
            </a>
            <a th:href="@{/admin/reportes/registros}">
                <i class="bi bi-people-fill"></i>
                <span>Matrículas Activas</span>
            </a>
            
        </div>
    </nav>
</div>
